# GitHub Actions workflow to publish latychain to PyPI.
#
# Two trigger modes:
#   1. Push a tag matching v*  (e.g. git tag v0.1.0 && git push --tags)
#   2. Manual dispatch via GitHub UI
#
# Requirements:
#   - A PyPI API token stored as GitHub secret: PYPI_API_TOKEN
#   - Get token from https://pypi.org/manage/account/token/

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for trusted publishing (optional, uses PYPI_API_TOKEN instead)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
