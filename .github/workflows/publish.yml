# GitHub Actions workflow to publish latychain to PyPI via OIDC (Trusted Publishing).
#
# Trigger: push a tag matching v*  (e.g. git tag v0.1.0 && git push --tags)
#
# Prerequisites (one-time PyPI setup):
#   1. Go to https://pypi.org/manage/project/latychain/settings/publishing/
#   2. Add a new trusted publisher:
#      - PyPI Project:  latychain
#      - Provider:      GitHub
#      - Owner:         fnsii
#      - Repository:    latychain
#      - Workflow:      publish.yml

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
